<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<body>
<div id="vbar"><span class="d"></span><span id="vip">IP…</span><span class="s">•</span><span id="vct">城市…</span></div>

<style>
#vbar{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);z-index:9999;
display:flex;align-items:center;gap:8px;max-width:92vw;padding:9px 12px;border-radius:14px;
background:rgba(20,20,22,.72);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);box-shadow:0 10px 28px rgba(0,0,0,.25);
font:13px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:rgba(255,255,255,.92)}
#vbar .d{width:8px;height:8px;border-radius:99px;background:rgba(60,220,140,.95);flex:0 0 auto}
#vip,#vct{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#vip{max-width:56vw;font-variant-numeric:tabular-nums;direction:ltr}
#vct{max-width:32vw;opacity:.9}
#vbar .s{opacity:.35;flex:0 0 auto}
</style>

<script>
(async()=>{
  const $ip=document.getElementById('vip'), $ct=document.getElementById('vct');
  const getText=async(url)=>{const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw 0; return (await r.text()).trim()};
  const getJson=async(url)=>{const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw 0; return await r.json()};

  // 1) IPv4 优先；没 IPv4 再走 IPv6（IP.SB 提供 v4/v6 专用端点） :contentReference[oaicite:1]{index=1}
  let ip='';
  try{ ip=await getText('https://api-ipv4.ip.sb/ip'); }
  catch(e){ try{ ip=await getText('https://api-ipv6.ip.sb/ip'); } catch(e2){ ip=await getText('https://api.ip.sb/ip'); } }

  // 2) 用拿到的 IP 去查城市（GeoIP 支持 /geoip/<ip>） :contentReference[oaicite:2]{index=2}
  let city='';
  try{
    const g=await getJson('https://api.ip.sb/geoip/'+encodeURIComponent(ip));
    city = g.city || g.region || '';
  }catch(e){}

  $ip.textContent = ip || '未知IP';
  $ct.textContent = city || '未知城市';
})();
</script>
</body>
